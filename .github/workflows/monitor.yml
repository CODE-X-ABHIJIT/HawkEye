name: FastCron Bank Monitor

on:
  repository_dispatch:
    types: [trigger-monitor]

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp curl_cffi

      - name: Run Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          INDIAN_PROXY: ${{ secrets.INDIAN_PROXY }}
        run: python check_urls.py
